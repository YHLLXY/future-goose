<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来鹅 V2 · 大学生职业成长AI陪伴体</title>
<style>
  :root{--primary:#f97316;--primary-dark:#ea580c;--secondary:#fb923c;--accent:#fbbf24;--bg:#fffbeb;--card:#ffffff;--text:#1e293b;--text-light:#64748b;--border:#fed7aa;--shadow:0 4px 24px rgba(249,115,22,0.08);--freshman:#10b981;--sophomore:#3b82f6;--junior:#8b5cf6;--senior:#f97316}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
  .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .particle{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0.3}
  @keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.3}90%{opacity:0.3}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}
  .header{background:linear-gradient(135deg,#f97316 0%,#fb923c 40%,#fbbf24 100%);color:white;padding:16px 24px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(249,115,22,0.2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .header .brand{display:flex;align-items:center;gap:10px;cursor:pointer}
  .header .logo{font-size:36px;animation:bounce 2s ease-in-out infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .header h1{font-size:22px;font-weight:700}
  .header-actions{display:flex;gap:8px;align-items:center}
  .grade-switcher{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;background:rgba(255,255,255,0.2);color:white;border:2px solid rgba(255,255,255,0.3);cursor:pointer;transition:all 0.3s;backdrop-filter:blur(4px);display:flex;align-items:center;gap:6px}
  .grade-switcher:hover{background:rgba(255,255,255,0.35);transform:scale(1.05)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;animation:fadeIn 0.3s ease}
  .modal-overlay.show{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:white;border-radius:20px;padding:32px 24px;max-width:600px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp 0.4s ease;max-height:85vh;overflow-y:auto}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal h2{text-align:center;margin-bottom:20px}
  .modal .grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .main-layout{max-width:1000px;margin:0 auto;padding:20px 16px 80px;position:relative;z-index:1}
  .onboarding{text-align:center;padding:48px 24px}
  .onboarding .mascot{font-size:80px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-15px) rotate(-3deg)}75%{transform:translateY(-15px) rotate(3deg)}}
  .onboarding h2{font-size:28px;margin:16px 0 8px;font-weight:700}
  .onboarding .subtitle{color:var(--text-light);margin-bottom:32px;font-size:16px}
  .grade-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:800px;margin:0 auto}
  @media(max-width:768px){.grade-cards{grid-template-columns:repeat(2,1fr)}}
  .grade-card{padding:28px 16px;border-radius:16px;cursor:pointer;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);border:2px solid var(--border);background:white;text-align:center;position:relative;overflow:hidden;transform-style:preserve-3d;perspective:800px}
  .grade-card:hover{transform:translateY(-6px) scale(1.03) rotateY(3deg) rotateX(-2deg);box-shadow:0 16px 40px rgba(0,0,0,0.12)}
  .grade-card .grade-icon{font-size:44px;margin-bottom:8px;position:relative;z-index:1;transition:transform 0.3s}
  .grade-card:hover .grade-icon{transform:scale(1.2) rotate(-10deg)}
  .grade-card .grade-name{font-weight:700;font-size:16px;margin-bottom:4px;position:relative;z-index:1}
  .grade-card .grade-desc{font-size:12px;color:var(--text-light);position:relative;z-index:1}
  .dashboard{display:none}
  .dashboard.show{display:block;animation:fadeInUp 0.5s ease}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:white;border-radius:14px;padding:4px;box-shadow:var(--shadow)}
  .tab{flex:1;padding:12px 12px;border:none;background:transparent;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-light);transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:4px}
  .tab:hover{background:#fff7ed}
  .tab.active{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(249,115,22,0.3);animation:tabPop 0.3s ease}
  @keyframes tabPop{0%{transform:scale(0.95)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
  .card{background:var(--card);border-radius:16px;padding:24px;box-shadow:var(--shadow);margin-bottom:16px;transition:all 0.3s ease;animation:cardIn 0.5s ease both}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card:hover{box-shadow:0 8px 32px rgba(249,115,22,0.12)}
  .card h3{font-size:18px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .chat-container{display:flex;flex-direction:column;height:500px}
  .chat-messages{flex:1;overflow-y:auto;padding:8px 4px;display:flex;flex-direction:column;gap:12px}
  .chat-msg{max-width:85%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;animation:msgIn 0.4s cubic-bezier(0.4,0,0.2,1)}
  @keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .chat-msg.ai{background:#fff7ed;align-self:flex-start;border-bottom-left-radius:4px}
  .chat-msg.user{background:var(--primary);color:white;align-self:flex-end;border-bottom-right-radius:4px}
  .chat-msg .msg-time{font-size:10px;opacity:0.5;margin-top:4px}
  .chat-quick{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
  .chat-quick-btn{padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:white;transition:all 0.3s;white-space:nowrap}
  .chat-quick-btn:hover{background:#fff7ed;border-color:var(--primary);transform:translateY(-2px)}
  .chat-input-row{display:flex;gap:8px;margin-top:8px}
  .chat-input-row input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:24px;font-size:14px;outline:none;font-family:inherit;transition:border-color 0.3s}
  .chat-input-row input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(249,115,22,0.1)}
  .chat-input-row button{width:44px;height:44px;border-radius:50%;border:none;background:var(--primary);color:white;font-size:18px;cursor:pointer;transition:all 0.3s;flex-shrink:0}
  .chat-input-row button:hover{background:var(--primary-dark);transform:scale(1.1)}
  .typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--secondary);animation:typing 1.4s ease-in-out infinite}
  .typing span:nth-child(2){animation-delay:0.2s}.typing span:nth-child(3){animation-delay:0.4s}
  @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-8px);opacity:1}}
  .timeline{position:relative;padding-left:28px}
  .timeline::before{content:'';position:absolute;left:12px;top:8px;bottom:8px;width:3px;background:linear-gradient(to bottom,var(--freshman),var(--sophomore),var(--junior),var(--senior));border-radius:2px}
  .timeline-item{position:relative;margin-bottom:24px}
  .timeline-dot{position:absolute;left:-22px;top:4px;width:14px;height:14px;border-radius:50%;border:3px solid white;transition:all 0.3s}
  .timeline-dot.done{background:var(--freshman);box-shadow:0 0 0 4px rgba(16,185,129,0.2)}
  .timeline-dot.current{background:var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(251,191,36,0.2)}50%{box-shadow:0 0 0 12px rgba(251,191,36,0.3)}}
  .timeline-dot.upcoming{background:#e2e8f0;box-shadow:0 0 0 4px #e2e8f0}
  .timeline-dot.unlocked{background:var(--freshman);animation:unlockPulse 1.5s ease-in-out}
  @keyframes unlockPulse{0%{box-shadow:0 0 0 0 rgba(16,185,129,0.6)}100%{box-shadow:0 0 0 16px rgba(16,185,129,0)}}
  .timeline-content{background:white;border-radius:12px;padding:16px;transition:all 0.3s;border:1px solid var(--border)}
  .timeline-content:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateX(4px)}
  .timeline-content h4{font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .timeline-content .tl-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
  .tl-tag.must{background:#fee2e2;color:#dc2626}.tl-tag.recommend{background:#dbeafe;color:#2563eb}
  .knowledge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .knowledge-card{padding:20px;border-radius:14px;border:1px solid var(--border);cursor:pointer;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);background:white;position:relative;overflow:hidden}
  .knowledge-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 32px rgba(0,0,0,0.1)}
  .knowledge-card .kc-icon{font-size:36px;margin-bottom:8px;transition:transform 0.4s}
  .knowledge-card:hover .kc-icon{transform:scale(1.2) rotate(5deg)}
  .knowledge-detail{display:none;position:relative;overflow:hidden}
  .knowledge-detail.show{display:block;animation:fadeInUp 0.4s ease}
  .knowledge-detail::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,#f97316,transparent);animation:scanLine 3s linear infinite}
  @keyframes scanLine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  .daily-card{background:linear-gradient(135deg,#fff7ed,#fffbeb);border:2px solid var(--accent);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;animation:glowPulse 3s ease-in-out infinite}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,0.3)}50%{box-shadow:0 0 20px 8px rgba(251,191,36,0.15)}}
  .goal-section{margin-bottom:20px}
  .goal-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);transition:all 0.3s}
  .goal-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:transparent}
  .goal-check:hover{border-color:var(--freshman);transform:scale(1.15)}
  .goal-check.done{background:var(--freshman);border-color:var(--freshman);color:white;animation:checkPop 0.4s ease}
  @keyframes checkPop{0%{transform:scale(0.5)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
  .goal-badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;background:#fef3c7;color:#92400e;transition:all 0.3s}
  .goal-badge.done{background:#d1fae5;color:#065f46}
  .progress-bar{height:10px;border-radius:5px;background:#e2e8f0;overflow:hidden;margin-top:8px}
  .progress-fill{height:100%;border-radius:5px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);background:linear-gradient(90deg,#f97316,#fbbf24)}
  .btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);border:none;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--primary);color:white}
  .btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 4px 16px rgba(249,115,22,0.3)}
  .btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
  .btn-outline{background:white;color:var(--primary);border:2px solid var(--primary)}
  .hidden-section{display:none}
  .hidden-section.show{display:block}
  .confetti-container{position:fixed;inset:0;pointer-events:none;z-index:300}
  .confetti-piece{position:absolute;width:12px;height:12px;border-radius:3px;animation:confettiFall linear forwards}
  @keyframes confettiFall{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
  .toast{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:10px;color:white;font-weight:500;z-index:1000;animation:slideIn 0.4s cubic-bezier(0.4,0,0.2,1);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
  .toast.success{background:var(--freshman)}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  .refresh-icon{cursor:pointer;transition:transform 0.6s;display:inline-block}
  .refresh-icon:hover{transform:rotate(180deg)}
  .settings-panel{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:12px;border-top:1px solid var(--border)}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
  .calendar-day{aspect-ratio:1;border-radius:4px;background:#e2e8f0;font-size:10px;display:flex;align-items:center;justify-content:center}
  .calendar-day.active{background:var(--primary);color:white}
  .calendar-day.visited{background:#fed7aa;color:#9a3412}
  .search-input{padding:8px 14px;border:2px solid var(--border);border-radius:10px;font-size:13px;width:100%;outline:none;font-family:inherit;transition:border-color 0.3s}
  .search-input:focus{border-color:var(--primary)}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="header">
  <div class="brand" onclick="resetAll()"><span class="logo">🐧</span><h1>未来鹅 V2 · 职业成长陪伴</h1></div>
  <div class="header-actions"><button class="grade-switcher" id="gradeSwitcherBtn" style="display:none" onclick="openGradeSwitcher()">🎓 <span id="gradeSwitcherLabel"></span> · 切换年级</button></div>
</div>
<div class="modal-overlay" id="gradeModal"><div class="modal"><h2>🔄 切换你的学习阶段</h2><p style="text-align:center;color:var(--text-light);margin-bottom:16px">随时可以切换，你的目标和路线图会自动更新</p><div class="grade-grid" id="gradeModalGrid"></div><div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="closeGradeSwitcher()" style="background:#94a3b8">取消</button></div></div></div>
<div class="main-layout">
  <div class="onboarding" id="onboarding"><div class="mascot">🐣</div><h2>你好！我是「未来鹅」</h2><p class="subtitle">你的 AI 职业成长陪伴伙伴，陪你从校园走向职场 ✨</p><p style="margin-bottom:24px;color:var(--text-light)">先告诉我你现在处于哪个阶段吧～</p><div class="grade-cards" id="onboardingCards"></div></div>
  <div class="dashboard" id="dashboard">
    <div class="daily-card" id="dailyCard"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('chat')">💬 AI 陪伴</button>
      <button class="tab" onclick="switchTab('roadmap')">🗺️ 成长路线图</button>
      <button class="tab" onclick="switchTab('knowledge')">📚 知识库</button>
      <button class="tab" onclick="switchTab('goals')">🎯 我的目标</button>
      <button class="tab" onclick="switchTab('calendar')">📅 学习日历</button>
    </div>
    <div class="hidden-section show" id="tab-chat"><div class="card"><h3>💬 与未来鹅深度对话</h3><div class="chat-container"><div class="chat-messages" id="chatMessages"></div><div class="chat-quick" id="chatQuick"></div><button class="btn btn-sm btn-outline" style="margin:4px 0" onclick="refreshTopics()">🔀 换一批推荐问题</button><div class="chat-input-row"><input type="text" id="chatInput" list="topicSuggest" placeholder="问我任何关于职业、技能、实习的问题…" onkeydown="if(event.key==='Enter')sendMessage()"><datalist id="topicSuggest"></datalist><button onclick="sendMessage()">➤</button></div></div></div></div>
    <div class="hidden-section" id="tab-roadmap"><div class="card"><h3>🗺️ 你的专属成长路线图</h3><p style="color:var(--text-light);font-size:14px;margin-bottom:16px">基于你当前阶段定制的成长路径（目标完成后自动解锁里程碑）</p><div class="timeline" id="timeline"></div></div></div>
    <div class="hidden-section" id="tab-knowledge"><div class="card"><h3>📚 互联网行业知识库</h3><input class="search-input" type="text" id="kbSearch" list="kbDatalist" placeholder="🔍 搜索知识库（输入关键词快速定位）..." oninput="filterKnowledge()"><datalist id="kbDatalist"></datalist><p style="color:var(--text-light);font-size:13px;margin:8px 0">共 <span id="kbCount">15</span> 个知识模块 · 点击展开详情 <button class="btn btn-sm btn-outline" onclick="randomRecommend()" style="margin-left:8px">🎲 随机推荐3个</button></p><div class="knowledge-grid" id="knowledgeGrid"></div><div class="knowledge-detail card" id="knowledgeDetail"></div></div></div>
    <div class="hidden-section" id="tab-goals"><div class="card"><h3>🎯 我的成长目标</h3><p style="color:var(--text-light);font-size:14px;margin-bottom:12px">每日刷新 · 每周挑战 · 阶段任务 <span style="font-size:11px">（基于日期种子随机分配）</span></p><div id="goalContainer"></div><div style="margin-top:16px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>总进度</span><span id="goalProgress">0%</span></div><div class="progress-bar"><div class="progress-fill" id="goalProgressBar" style="width:0%"></div></div></div><div class="settings-panel"><button class="btn btn-sm btn-outline" onclick="resetGoals()">🔄 重置今日目标</button><button class="btn btn-sm btn-outline" onclick="clearChat()">💬 清空对话</button><button class="btn btn-sm btn-outline" onclick="resetAll()">🔃 恢复默认</button></div></div></div>
    <div class="hidden-section" id="tab-calendar"><div class="card"><h3>📅 学习日历</h3><p style="color:var(--text-light);font-size:14px;margin-bottom:12px">记录每日访问，坚持就是胜利 🔥</p><div id="calendarView"></div></div></div>
  </div>
</div>
<div class="confetti-container" id="confetti"></div>
<script>
// ============ PARTICLES ============
(function(){const c=document.getElementById('particles');const colors=['#fbbf24','#fb923c','#f97316','#fed7aa','#ffedd5','#10b981','#3b82f6','#8b5cf6'];for(let i=0;i<55;i++){const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*100}%;width:${4+Math.random()*10}px;height:${4+Math.random()*10}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${8+Math.random()*20}s;animation-delay:${Math.random()*15}s;`;c.appendChild(p)}})();

// ============ STORAGE ============
const SK='future_goose_v2';
function ld(){try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null}catch(e){return null}}
function sv(d){localStorage.setItem(SK,JSON.stringify(d))}
let state=ld()||{goals:{},chatHistory:[],visitDates:{}};
let allGoals=state.goals||{},goalSetCache={},chatHistory=state.chatHistory||[],visitDates=state.visitDates||{};
const todayStr=new Date().toISOString().split('T')[0];
// Record visit
visitDates[todayStr]=true;state.visitDates=visitDates;sv(state);

// ============ CONFETTI ============
function launchConfetti(){const c=document.getElementById('confetti');const colors=['#fbbf24','#f97316','#10b981','#3b82f6','#8b5cf6','#ef4444','#ec4899','#14b8a6'];for(let i=0;i<60;i++){setTimeout(()=>{const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;top:-20px;width:${8+Math.random()*14}px;height:${8+Math.random()*14}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2+Math.random()*3}s;border-radius:${Math.random()>0.5?'50%':'2px'};`;c.appendChild(p);setTimeout(()=>p.remove(),3500)},i*15)}}
function launchMiniConfetti(){const c=document.getElementById('confetti');const colors=['#fbbf24','#f97316','#10b981'];for(let i=0;i<20;i++){setTimeout(()=>{const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${40+Math.random()*20}%;top:-20px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;`;c.appendChild(p);setTimeout(()=>p.remove(),3500)},i*20)}}

// ============ GRADE SYSTEM ============
const gradeInfo={freshman:{name:'大一·探索期',icon:'🌱',emoji:'🌱',slogan:'探索无限可能'},sophomore:{name:'大二·成长期',icon:'🌿',emoji:'🌿',slogan:'扎根积累力量'},junior:{name:'大三·实习期',icon:'🌳',emoji:'🌳',slogan:'蓄力冲刺舞台'},senior:{name:'大四/研·求职期',icon:'🍊',emoji:'🍊',slogan:'收获理想offer'}};
let userGrade='';

const aiKnowledge={freshman:{intro:'大一正是探索的黄金期！',topics:{'了解互联网行业':'互联网行业六大方向：①技术研发 ②产品经理 ③设计 ④运营 ⑤市场与销售 ⑥职能。大一时每个方向都了解一下，找到你感兴趣的～\n\n📚 推荐关注「腾讯招聘」「字节跳动招聘」公众号、浏览牛客网。','学什么编程语言':'大一推荐从 Python 或前端（HTML/CSS/JavaScript）入手。Python适合AI/数据方向，前端所见即所得。先选定一门，学3个月后再扩展。','腾讯是怎样的公司':'腾讯是中国最大的互联网公司之一：社交(微信/QQ)、游戏(王者荣耀/和平精英)、云(腾讯云)、AI(混元大模型)、金融科技(微信支付)、内容(腾讯视频/QQ音乐)。企业文化：用户为本、科技向善。','参加什么社团活动':'大一推荐：技术类(ACM/开源社区)、产品类(产品经理协会)、实践类(Hackathon)、综合类(学生会)。关键不是参加了多少，而是做出了什么成果。','如何规划大学四年':'大一探索→大二聚焦→大三实践→大四冲刺。每学期设2-3个具体目标，每学期末复盘一次。','什么是STAR法则':'Situation→Task→Action→Result。写简历和面试的黄金框架。如"在XX项目中(S)，我负责优化页面性能(T)，通过代码分割和懒加载(A)，页面加载时间降低40%(R)。"','互联网行业前景':'2025-2026趋势：AI大模型全面落地、出海第二增长曲线、产业互联网深入制造业、数据安全岗位激增。关注AI+垂直行业交叉机会。','如何建立学习习惯':'每天固定30分钟学习时间，用Notion记录笔记。关注3-5个优质技术博客。关键是持续性，不是突击。'},default:'大一探索期！你可以问我：了解互联网行业、学什么编程语言、腾讯是怎样的公司...'},sophomore:{intro:'大二是积累的关键期！',topics:{'前端学习路线':'大二前端路径：①HTML/CSS/JS基础(1-2月)②React/Vue框架(2-3月)③TypeScript+工程化(1-2月)④Node.js+数据库+部署。检验标准：独立完成一个全栈项目。','后端学习路线':'大二后端路径：①语言选择Go(腾讯主流)或Java(通用)②数据结构与算法③框架(Gin/Spring Boot)④数据库(MySQL+Redis)⑤进阶(消息队列/容器化/微服务)。','AI/ML学习路线':'大二AI路径：①数学基础(线代/概率)②Python+NumPy/Pandas③吴恩达ML课程④PyTorch/TensorFlow⑤Kaggle实战。检验标准：Kaggle Top 50%。','如何做项目':'核心原则：解决真实问题>技术炫技，完整度>复杂度，有文档，有数据(用户量/性能提升)。项目灵感：校园二手平台、课程评价系统、AI学习助手。','腾讯技术栈':'WXG(微信):C++/Node.js、IEG(游戏):C++/Unity、CSIG(云):Go/Java/K8s、CDG:Java/Python/大数据、TEG:Go/C++/Rust。','参加什么比赛':'编程类:ACM/蓝桥杯、AI类:Kaggle/天池、开发类:小程序大赛/黑客松、产品类:校园产品策划大赛。','如何积累GitHub':'从小项目开始，保持提交频率。写清晰的README。参与开源项目（从修文档到提PR）。GitHub是技术人的第二份简历。','如何准备第一份实习简历':'一页PDF，结构：个人信息→教育背景→技术栈→项目经历。每个项目用STAR法则，量化成果。找3个以上的人帮忙Review。'},default:'大二积累关键期！你可以问我：前端/后端/AI学习路线、如何做项目、腾讯技术栈...'},junior:{intro:'大三到了冲刺阶段！',topics:{'暑期实习时间线':'2-3月关注公众号准备简历→3月中网申→3-4月笔试→4-5月面试(2-3轮技术+1轮HR)→5-6月发offer→6-8月实习(表现优秀可转正)。现在就开始准备！','如何准备技术面试':'算法(40%):LeetCode高频100道；项目(30%):脱稿讲5分钟；基础(20%):计网/OS/DB；系统设计(10%):基本架构模式。每天3题+复盘1项目。','简历怎么写':'一页PDF，结构清晰。用STAR法则写项目经历。量化成果。针对不同岗位准备不同版本。避免自我评价空洞、排版花哨。','腾讯面试流程':'4-5轮：R1-2技术面(代码+项目+基础)、R3 Leader面(技术视野+项目深度)、R4 HR面(职业规划+价值观)。每轮后24h内通知结果。','群面怎么脱颖而出':'当"推进者"而非"Leader"。先听后说。用框架组织讨论。适当cue沉默同学。最后帮助总结。技术岗一般无群面。','实习期间如何争取转正':'超出预期最重要。主动性：主动沟通、汇报、提建议。学习力：快速上手。靠谱：守住deadline。定期和导师1v1。','秋招策略':'梯度投递：BAT/TMD+独角兽+保底。用Excel管理进度。每天上午投递+下午刷题+晚上复盘。内推优先。','心态管理':'焦虑正常。写下来变成行动清单。找到"战友"。保持运动和睡眠。专注能控制的事。面试失败不代表你不够好。'},default:'大三冲刺期！你可以问我：暑期实习时间线、如何准备技术面试、简历怎么写...'},senior:{intro:'求职冲刺阶段！',topics:{'秋招策略':'梯度投递30+企业。用Excel记录每家状态。每天上午投递+下午刷题+晚上复盘。内推优先。海投20-30家，聚焦5-8家重点准备。','offer选择':'评估维度：团队和Leader(50%)>业务前景(20%)>薪资(15%)>城市(10%)>公司品牌(5%)。和在职前辈聊聊真实情况。','入职前准备':'技术准备：了解部门技术栈。人脉连接：加同事微信。阅读积累：看团队技术博客。生活安排：租房/通勤/社保。享受最后的校园时光。','心态管理':'焦虑正常。写下来变成行动清单。找到"战友"。保持运动和睡眠。专注能控制的事。','薪资谈判':'了解市场价(牛客Offer Show)。有其他offer可"善意竞争"。关注总包而非月薪。坦诚沟通，不"威胁"HR。','非技术岗求职':'产品经理：产品分析报告+竞品分析+原型设计。运营：数据分析+内容策划+活动方案。市场：营销案例+品牌分析。结合AI工具展示能力。','职场第一课':'主动沟通>被动等待。先理解再执行。记录产出和成果。建立跨团队人脉。持续学习。','长期职业规划':'前3年：积累核心能力。3-5年：成为某个领域的专家。5-10年：建立行业影响力。保持开放心态。'},default:'求职冲刺中！你可以问我：秋招策略、offer选择、入职前准备...'}};

function initAllGoals(){allGoals={};goalSetCache={};const all=[...getDailyGoals(userGrade),...getWeeklyGoals(userGrade),...getStageGoals(userGrade)];all.forEach(g=>{if(!(g.id in allGoals))allGoals[g.id]=false;goalSetCache[g.id]=g})}
function switchGrade(grade){if(userGrade===grade){closeGradeSwitcher();return}userGrade=grade;initAllGoals();document.getElementById('gradeSwitcherLabel').textContent=gradeInfo[grade].icon+' '+gradeInfo[grade].name;closeGradeSwitcher();renderDaily();initChat();renderRoadmap();renderKnowledge();renderGoals();renderCalendar();switchTab('chat');showToast('🔄 已切换到 '+gradeInfo[grade].name,'success');launchMiniConfetti()}
function openGradeSwitcher(){document.getElementById('gradeModal').classList.add('show')}

// ============ CHAT ============
function initChat(){
  const msgs=document.getElementById('chatMessages'),quick=document.getElementById('chatQuick');
  const info=gradeInfo[userGrade],knowledge=aiKnowledge[userGrade];
  const topics=Object.keys(knowledge.topics);
  // Show cached topics or first batch
  if(!window._topicBatch||window._topicBatch.grade!==userGrade){window._topicBatch={grade:userGrade,batch:0,topics:topics.sort(()=>0.5-Math.random())}}
  const batch=window._topicBatch.topics.slice(0,4);
  if(chatHistory.length===0){msgs.innerHTML=`<div class="chat-msg ai">👋 嗨！我是未来鹅，你的专属职业成长伙伴～<br>看到你是 <strong>${info.icon} ${info.name}</strong>，我会给你最贴心的陪伴和建议！<br>你可以直接问我任何问题 ✨<div class="msg-time">刚刚</div></div>`}else{msgs.innerHTML=chatHistory.map(m=>`<div class="chat-msg ${m.role}">${m.text}<div class="msg-time">${m.time}</div></div>`).join('')}
  quick.innerHTML=batch.map(t=>`<button class="chat-quick-btn" onclick="quickAsk('${t}')">${t}</button>`).join('');
  // Update datalist
  document.getElementById('topicSuggest').innerHTML=topics.map(t=>`<option value="${t}">`).join('');
  msgs.scrollTop=msgs.scrollHeight;
}
function refreshTopics(){window._topicBatch.batch++;initChat();launchMiniConfetti();showToast('🔀 已刷新推荐问题','success')}
function quickAsk(q){document.getElementById('chatInput').value=q;sendMessage()}
function sendMessage(){
  const input=document.getElementById('chatInput');const msg=input.value.trim();if(!msg)return;
  const msgs=document.getElementById('chatMessages');
  const time=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  msgs.innerHTML+=`<div class="chat-msg user">${msg}<div class="msg-time">${time}</div></div>`;
  chatHistory.push({role:'user',text:msg,time});if(chatHistory.length>40)chatHistory.shift();
  const typingId='typing_'+Date.now();msgs.innerHTML+=`<div class="typing" id="${typingId}"><span></span><span></span><span></span></div>`;msgs.scrollTop=msgs.scrollHeight;input.value='';
  const delay=600+Math.random()*1200;
  setTimeout(()=>{const typing=document.getElementById(typingId);if(typing)typing.remove();
    const reply=getAIResponse(msg);msgs.innerHTML+=`<div class="chat-msg ai">${reply}<div class="msg-time">${time}</div></div>`;
    chatHistory.push({role:'ai',text:reply,time});if(chatHistory.length>40)chatHistory.shift();
    state.chatHistory=chatHistory;sv(state);msgs.scrollTop=msgs.scrollHeight;
  },delay);
}
function getAIResponse(msg){const knowledge=aiKnowledge[userGrade];const m=msg.toLowerCase();for(const[topic,response]of Object.entries(knowledge.topics)){const tk=topic.split('').filter(c=>c.charCodeAt(0)>127).join('');if(tk.length>2&&m.includes(tk.substring(0,3)))return response;if(topic.length>3&&m.includes(topic.substring(0,4)))return response}const topics=Object.keys(knowledge.topics);const suggestions=topics.slice(0,4).map(t=>`「${t}」`).join('、');return knowledge.default+'\n\n💡 你可以试试问我：'+suggestions}
function clearChat(){chatHistory=[];state.chatHistory=chatHistory;sv(state);initChat();showToast('💬 对话已清空','success')}

  const items=roadmaps[userGrade]||roadmaps.freshman;
  const doneCount=Object.values(allGoals).filter(v=>v).length;
  document.getElementById('timeline').innerHTML=items.map((item,i)=>{
    let dotCls='upcoming';if(i===0)dotCls='current';if(doneCount>=(i+1)*3)dotCls='unlocked';else if(doneCount>=(i+1)*2)dotCls='done';
    return`<div class="timeline-item" style="animation:fadeInUp ${0.3+i*0.15}s ease both"><div class="timeline-dot ${dotCls}"></div><div class="timeline-content"><h4>${i+1}. ${item.title} <span class="tl-tag ${item.tag==='must'?'must':'recommend'}">${item.tagLabel}</span></h4><p>${item.desc}</p><div class="tl-resources">📎 ${item.resources.map(r=>`<span>${r}</span>`).join(' ')}</div></div></div>`
  }).join('');
}

function renderGoals(){

  document.getElementById('goalContainer').innerHTML=`<div class="goal-section"><h4>📅 今日任务 <span style="font-size:11px;color:var(--text-light);font-weight:400">${todayStr} · 每日0点刷新</span></h4>${dailyG.map(g=>renderGoalItem(g)).join('')}</div><div class="goal-section"><h4>📆 本周挑战</h4>${weeklyG.map(g=>renderGoalItem(g)).join('')}</div><div class="goal-section"><h4>🏆 阶段目标</h4>${stageG.map(g=>renderGoalItem(g)).join('')}</div>`;
  document.getElementById('goalProgress').textContent=pct+'%';document.getElementById('goalProgressBar').style.width=pct+'%';

}
function renderGoalItem(g){const done=allGoals[g.id]||false;return`<div class="goal-item"><div class="goal-check ${done?'done':''}" onclick="toggleGoal('${g.id}')">${done?'✓':''}</div><div class="goal-info"><div class="goal-title">${done?'<s>'+g.title+'</s>':g.title}</div><div class="goal-detail">${g.detail}</div></div><span class="goal-badge ${done?'done':''}">${done?'✅ 完成':'⏳ 进行中'}</span></div>`}
function toggleGoal(id){allGoals[id]=!allGoals[id];state.goals=allGoals;sv(state);renderGoals();if(allGoals[id]){const c=document.getElementById('confetti');for(let i=0;i<8;i++){setTimeout(()=>{const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${30+Math.random()*40}%;top:-10px;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;background:#10b981;animation-duration:${1+Math.random()*2}s;`;c.appendChild(p);setTimeout(()=>p.remove(),3000)},i*20)}}}
function resetGoals(){if(confirm('确定重置所有目标进度？')){allGoals={};state.goals=allGoals;sv(state);renderGoals();showToast('🔄 目标已重置','success')}}
function resetAll(){if(confirm('确定恢复默认？将清除所有进度和对话。')){allGoals={};chatHistory=[];state={goals:{},chatHistory:[],visitDates:visitDates};sv(state);userGrade='';document.getElementById('onboarding').style.display='';document.getElementById('dashboard').classList.remove('show');document.getElementById('gradeSwitcherBtn').style.display='none';showToast('🔃 已恢复默认状态','success')}}

// ============ CALENDAR ============
function renderCalendar(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  let html='<div style="text-align:center;font-size:14px;margin-bottom:8px;font-weight:600">'+now.getFullYear()+'年'+(m+1)+'月</div><div class="calendar-grid">';
  const weekDays=['日','一','二','三','四','五','六'];
  weekDays.forEach(d=>{html+=`<div style="text-align:center;font-size:10px;color:var(--text-light);padding:4px">${d}</div>`});
  for(let i=0;i<firstDay;i++)html+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isToday=d===now.getDate();const visited=visitDates[ds];html+=`<div class="calendar-day${isToday?' active':''}${visited&&!isToday?' visited':''}" title="${visited?'已签到':''}">${d}</div>`}
  html+='</div><p style="font-size:11px;color:var(--text-light);margin-top:8px;text-align:center">🔥 已累计访问 '+Object.keys(visitDates).length+' 天</p>';
  document.getElementById('calendarView').innerHTML=html;
}

// ============ TABS ============
function switchTab(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.hidden-section').forEach(s=>s.classList.remove('show'));const idx=['chat','roadmap','knowledge','goals','calendar'].indexOf(tab);if(idx>=0){document.querySelectorAll('.tab')[idx].classList.add('active');document.getElementById('tab-'+tab).classList.add('show')}if(tab==='chat')setTimeout(()=>{document.getElementById('chatMessages').scrollTop=document.getElementById('chatMessages').scrollHeight},100);if(tab==='goals')renderGoals();if(tab==='calendar')renderCalendar()}

// ============ TOAST ============
function showToast(msg,type){const t=document.createElement('div');t.className='toast '+(type||'success');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.animation='slideIn 0.3s ease reverse';setTimeout(()=>t.remove(),300)},2500)}
function shuffle(arr){let m=arr.length,t,i;while(m){i=Math.floor(Math.random()*m--);t=arr[m];arr[m]=arr[i];arr[i]=t}return arr}
</script>
