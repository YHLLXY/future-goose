<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来鹅 - 大学生职业成长AI陪伴体</title>
<style>
  :root {
    --primary: #f97316; --primary-dark: #ea580c; --secondary: #fb923c;
    --accent: #fbbf24; --bg: #fffbeb; --card: #ffffff; --text: #1e293b;
    --text-light: #64748b; --border: #fed7aa; --shadow: 0 4px 24px rgba(249,115,22,0.08);
    --freshman: #10b981; --sophomore: #3b82f6; --junior: #8b5cf6; --senior: #f97316;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
    overflow-x: hidden;
  }

  /* Particle background */
  .particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .particle {
    position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0.3;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #f97316 0%, #fb923c 40%, #fbbf24 100%);
    color: white; padding: 16px 24px; text-align: center; position: sticky; top: 0;
    z-index: 100; box-shadow: 0 2px 16px rgba(249,115,22,0.2);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .header .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .header .logo { font-size: 36px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .grade-switcher {
    padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer; transition: all 0.3s; backdrop-filter: blur(4px);
    display: flex; align-items: center; gap: 6px;
  }
  .grade-switcher:hover { background: rgba(255,255,255,0.35); transform: scale(1.05); }

  /* Grade selector modal */
  .modal-overlay {
    display: none; position: fixed; inset:0; background: rgba(0,0,0,0.5);
    z-index: 200; align-items: center; justify-content: center; animation: fadeIn 0.3s ease;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .modal {
    background: white; border-radius: 20px; padding: 32px 24px; max-width: 600px;
    width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideUp 0.4s ease;
  }
  @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .modal h2 { text-align: center; margin-bottom: 20px; }
  .modal .grade-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }

  /* Main Layout */
  .main-layout { max-width: 1000px; margin: 0 auto; padding: 20px 16px 80px; position: relative; z-index: 1; }

  /* Onboarding */
  .onboarding { text-align: center; padding: 48px 24px; }
  .onboarding .mascot { font-size: 80px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-15px) rotate(-3deg); } 75% { transform: translateY(-15px) rotate(3deg); } }
  .onboarding h2 { font-size: 28px; margin: 16px 0 8px; font-weight: 700; }
  .onboarding .subtitle { color: var(--text-light); margin-bottom: 32px; font-size: 16px; }
  .grade-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; max-width: 800px; margin: 0 auto; }
  @media (max-width: 768px) { .grade-cards { grid-template-columns: repeat(2,1fr); } }
  .grade-card {
    padding: 28px 16px; border-radius: 16px; cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    border: 2px solid var(--border); background: white; text-align: center; position: relative; overflow: hidden;
  }
  .grade-card::before {
    content:''; position:absolute; inset:0; opacity:0; transition: opacity 0.4s;
    border-radius: 16px;
  }
  .grade-card.freshman::before { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
  .grade-card.sophomore::before { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
  .grade-card.junior::before { background: linear-gradient(135deg, #ede9fe, #ddd6fe); }
  .grade-card.senior::before { background: linear-gradient(135deg, #fff7ed, #fed7aa); }
  .grade-card:hover::before { opacity: 0.5; }
  .grade-card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 16px 40px rgba(0,0,0,0.12); }
  .grade-card .grade-icon { font-size: 44px; margin-bottom: 8px; position: relative; z-index: 1; transition: transform 0.3s; }
  .grade-card:hover .grade-icon { transform: scale(1.2) rotate(-10deg); }
  .grade-card .grade-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; position: relative; z-index: 1; }
  .grade-card .grade-desc { font-size: 12px; color: var(--text-light); position: relative; z-index: 1; }

  /* Dashboard */
  .dashboard { display: none; }
  .dashboard.show { display: block; animation: fadeInUp 0.5s ease; }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 4px; box-shadow: var(--shadow); }
  .tab {
    flex: 1; padding: 12px 12px; border: none; background: transparent; border-radius: 10px;
    cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-light); transition: all 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 4px; position: relative; overflow: hidden;
  }
  .tab:hover { background: #fff7ed; }
  .tab.active { background: var(--primary); color: white; box-shadow: 0 2px 8px rgba(249,115,22,0.3); animation: tabPop 0.3s ease; }
  @keyframes tabPop { 0% { transform: scale(0.95); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  /* Cards */
  .card {
    background: var(--card); border-radius: 16px; padding: 24px;
    box-shadow: var(--shadow); margin-bottom: 16px; transition: all 0.3s ease;
    animation: cardIn 0.5s ease both;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .card:hover { box-shadow: 0 8px 32px rgba(249,115,22,0.12); }
  .card h3 { font-size: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

  /* Chat */
  .chat-container { display: flex; flex-direction: column; height: 500px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 8px 4px; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg {
    max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.7;
    animation: msgIn 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes msgIn { from { opacity:0; transform:translateY(12px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }
  .chat-msg.ai { background: #fff7ed; align-self: flex-start; border-bottom-left-radius: 4px; }
  .chat-msg.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .chat-msg .msg-time { font-size: 10px; opacity: 0.5; margin-top: 4px; }
  .chat-quick { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .chat-quick-btn {
    padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border); background: white; transition: all 0.3s;
    white-space: nowrap;
  }
  .chat-quick-btn:hover { background: #fff7ed; border-color: var(--primary); transform: translateY(-2px); }
  .chat-input-row { display: flex; gap: 8px; margin-top: 8px; }
  .chat-input-row input {
    flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: 24px;
    font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.3s;
  }
  .chat-input-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
  .chat-input-row button {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: var(--primary); color: white; font-size: 18px; cursor: pointer;
    transition: all 0.3s; flex-shrink: 0;
  }
  .chat-input-row button:hover { background: var(--primary-dark); transform: scale(1.1); }

  /* Chat typing indicator */
  .typing { display: flex; gap: 4px; padding: 12px 16px; align-self: flex-start; }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--secondary);
    animation: typing 1.4s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100% { transform: translateY(0); opacity:0.4; } 30% { transform: translateY(-8px); opacity:1; } }

  /* Roadmap Timeline */
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before {
    content: ''; position: absolute; left: 12px; top: 8px; bottom: 8px;
    width: 3px; background: linear-gradient(to bottom, var(--freshman), var(--sophomore), var(--junior), var(--senior));
    border-radius: 2px;
  }
  .timeline-item { position: relative; margin-bottom: 24px; }
  .timeline-dot {
    position: absolute; left: -22px; top: 4px; width: 14px; height: 14px;
    border-radius: 50%; border: 3px solid white; transition: all 0.3s;
  }
  .timeline-dot.done { background: var(--freshman); box-shadow: 0 0 0 4px rgba(16,185,129,0.2); }
  .timeline-dot.current { background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px rgba(251,191,36,0.2); } 50% { box-shadow: 0 0 0 12px rgba(251,191,36,0.3); } }
  .timeline-dot.upcoming { background: #e2e8f0; box-shadow: 0 0 0 4px #e2e8f0; }
  .timeline-content {
    background: white; border-radius: 12px; padding: 16px; transition: all 0.3s;
    border: 1px solid var(--border);
  }
  .timeline-content:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateX(4px); }
  .timeline-content h4 { font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .timeline-content .tl-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
  }
  .tl-tag.must { background: #fee2e2; color: #dc2626; }
  .tl-tag.recommend { background: #dbeafe; color: #2563eb; }
  .timeline-content p { font-size: 13px; color: var(--text-light); margin: 6px 0; }
  .timeline-content .tl-resources { font-size: 12px; color: var(--primary); margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tl-resources span { padding: 3px 8px; background: #fff7ed; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .tl-resources span:hover { background: #fed7aa; }

  /* Knowledge cards */
  .knowledge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 12px; }
  .knowledge-card {
    padding: 20px; border-radius: 14px; border: 1px solid var(--border); cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1); background: white;
    position: relative; overflow: hidden;
  }
  .knowledge-card::after {
    content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(249,115,22,0.1), transparent);
    opacity: 0; transition: opacity 0.4s;
  }
  .knowledge-card:hover::after { opacity: 1; }
  .knowledge-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
  .knowledge-card .kc-icon { font-size: 36px; margin-bottom: 8px; transition: transform 0.4s; }
  .knowledge-card:hover .kc-icon { transform: scale(1.2) rotate(5deg); }
  .knowledge-card .kc-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .knowledge-card .kc-desc { font-size: 12px; color: var(--text-light); }

  /* Knowledge detail modal */
  .knowledge-detail { display: none; }
  .knowledge-detail.show { display: block; animation: fadeInUp 0.4s ease; }

  /* Daily card */
  .daily-card {
    background: linear-gradient(135deg, #fff7ed, #fffbeb);
    border: 2px solid var(--accent); border-radius: 16px; padding: 24px;
    text-align: center; margin-bottom: 16px; position: relative; overflow: hidden;
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.3); } 50% { box-shadow: 0 0 20px 8px rgba(251,191,36,0.15); } }
  .daily-card .daily-icon { font-size: 48px; margin-bottom: 8px; animation: float 2.5s ease-in-out infinite; }
  .daily-card .daily-quote { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .daily-card .daily-tip { font-size: 13px; color: var(--text-light); }

  /* Goal tracker */
  .goal-section { margin-bottom: 20px; }
  .goal-section h4 { font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .goal-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border); transition: all 0.3s;
  }
  .goal-item:last-child { border-bottom: none; }
  .goal-item:hover { background: #fffbeb; margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 8px; }
  .goal-check {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border);
    cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 14px; color: transparent;
  }
  .goal-check:hover { border-color: var(--freshman); transform: scale(1.15); }
  .goal-check.done { background: var(--freshman); border-color: var(--freshman); color: white; animation: checkPop 0.4s ease; }
  @keyframes checkPop { 0% { transform: scale(0.5); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
  .goal-info { flex: 1; }
  .goal-info .goal-title { font-size: 14px; font-weight: 500; }
  .goal-info .goal-detail { font-size: 12px; color: var(--text-light); }
  .goal-badge {
    padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap;
    background: #fef3c7; color: #92400e; transition: all 0.3s;
  }
  .goal-badge.done { background: #d1fae5; color: #065f46; }

  .progress-bar {
    height: 10px; border-radius: 5px; background: #e2e8f0; overflow: hidden; margin-top: 8px;
  }
  .progress-fill {
    height: 100%; border-radius: 5px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    background: linear-gradient(90deg, #f97316, #fbbf24);
  }

  /* Buttons */
  .btn {
    padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); border: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(249,115,22,0.3); }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }

  .hidden-section { display: none; }
  .hidden-section.show { display: block; }

  /* Confetti */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
  .confetti-piece {
    position: absolute; width: 12px; height: 12px; border-radius: 3px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* Toast */
  .toast {
    position: fixed; top: 24px; right: 24px; padding: 14px 24px;
    border-radius: 10px; color: white; font-weight: 500; z-index: 1000;
    animation: slideIn 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .toast.success { background: var(--freshman); }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }

  /* Refresh icon rotation */
  .refresh-icon { cursor: pointer; transition: transform 0.6s; display: inline-block; }
  .refresh-icon:hover { transform: rotate(180deg); }
</style>
</head>
<body>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="header">
  <div class="brand" onclick="location.reload()">
    <span class="logo">🐧</span>
    <h1>未来鹅 · 职业成长陪伴</h1>
  </div>
  <div class="header-actions">
    <button class="grade-switcher" id="gradeSwitcherBtn" style="display:none;" onclick="openGradeSwitcher()">
      🎓 <span id="gradeSwitcherLabel"></span> · 切换年级
    </button>
  </div>
</div>

<!-- Grade Switcher Modal -->
<div class="modal-overlay" id="gradeModal">
  <div class="modal">
    <h2>🔄 切换你的学习阶段</h2>
    <p style="text-align:center;color:var(--text-light);margin-bottom:16px;">随时可以切换，你的目标和路线图会自动更新</p>
    <div class="grade-grid" id="gradeModalGrid"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-primary" onclick="closeGradeSwitcher()" style="background:#94a3b8;">取消</button>
    </div>
  </div>
</div>

<div class="main-layout">

  <!-- Onboarding -->
  <div class="onboarding" id="onboarding">
    <div class="mascot">🐣</div>
    <h2>你好！我是「未来鹅」</h2>
    <p class="subtitle">你的 AI 职业成长陪伴伙伴，陪你从校园走向职场 ✨</p>
    <p style="margin-bottom:24px;color:var(--text-light);">先告诉我你现在处于哪个阶段吧～（随时可以更改哦）</p>
    <div class="grade-cards" id="onboardingCards"></div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="daily-card" id="dailyCard"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('chat')">💬 AI 陪伴</button>
      <button class="tab" onclick="switchTab('roadmap')">🗺️ 成长路线图</button>
      <button class="tab" onclick="switchTab('knowledge')">📚 知识库</button>
      <button class="tab" onclick="switchTab('goals')">🎯 我的目标</button>
    </div>

    <div class="hidden-section show" id="tab-chat"><div class="card"><h3>💬 与未来鹅深度对话</h3><div class="chat-container"><div class="chat-messages" id="chatMessages"></div><div class="chat-quick" id="chatQuick"></div><div class="chat-input-row"><input type="text" id="chatInput" placeholder="问我任何关于职业、技能、实习、腾讯的问题…" onkeydown="if(event.key==='Enter')sendMessage()"><button onclick="sendMessage()">➤</button></div></div></div></div>

    <div class="hidden-section" id="tab-roadmap"><div class="card"><h3>🗺️ 你的专属成长路线图</h3><p style="color:var(--text-light);font-size:14px;margin-bottom:16px;">基于你当前阶段定制的成长路径，含推荐资源和时间节点</p><div class="timeline" id="timeline"></div></div></div>

    <div class="hidden-section" id="tab-knowledge"><div class="card"><h3>📚 互联网行业知识库</h3><p style="color:var(--text-light);font-size:14px;margin-bottom:16px;">点击卡片查看详情，建立系统化行业认知</p><div class="knowledge-grid" id="knowledgeGrid"></div><div class="knowledge-detail card" id="knowledgeDetail"></div></div></div>

    <div class="hidden-section" id="tab-goals"><div class="card"><h3>🎯 我的成长目标</h3><p style="color:var(--text-light);font-size:14px;margin-bottom:12px;">每日刷新 · 每周挑战 · 阶段任务 · 全部完成会有惊喜 🎉</p><div id="goalContainer"></div><div style="margin-top:16px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span>总进度</span><span id="goalProgress">0%</span></div><div class="progress-bar"><div class="progress-fill" id="goalProgressBar" style="width:0%"></div></div></div></div></div>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
// ==================== STATE ====================
let userGrade = '';
let allGoals = {};   // { id: true/false }
let goalSetCache = {};
const todayStr = new Date().toISOString().split('T')[0];

// ==================== PARTICLES ====================
(function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['#fbbf24','#fb923c','#f97316','#fed7aa','#ffedd5','#10b981','#3b82f6','#8b5cf6'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left:${Math.random()*100}%; width:${4+Math.random()*10}px; height:${4+Math.random()*10}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${8+Math.random()*20}s; animation-delay:${Math.random()*15}s;
    `;
    container.appendChild(p);
  }
})();

// ==================== CONFETTI ====================
function launchConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#fbbf24','#f97316','#10b981','#3b82f6','#8b5cf6','#ef4444','#ec4899','#14b8a6'];
  for (let i = 0; i < 60; i++) {

      { id:'s2', title:'完成10次面试复盘', detail:'归纳高频题和自己的答题模板' },
      { id:'s3', title:'拿到2个以上offer', detail:'有选择的余地' },
      { id:'s4', title:'完成大学成长总结', detail:'回看四年，输出一份成长记录' },
    ],
  };
  return sets[grade] || sets.freshman;
}

// ==================== CORE FUNCTIONS ====================

function startJourney(grade) {
  userGrade = grade;
  initAllGoals();
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('dashboard').classList.add('show');
  document.getElementById('gradeSwitcherBtn').style.display = '';
  document.getElementById('gradeSwitcherLabel').textContent = gradeInfo[grade].icon + ' ' + gradeInfo[grade].name;
  renderDaily();
  initChat();
  renderRoadmap();
  renderKnowledge();
  renderGoals();
  switchTab('chat');
}

function initAllGoals() {
  allGoals = {};
  goalSetCache = {};
  const all = [...getDailyGoals(userGrade), ...getWeeklyGoals(userGrade), ...getStageGoals(userGrade)];
  all.forEach(g => { allGoals[g.id] = false; goalSetCache[g.id] = g; });
}

function switchGrade(grade) {
  if (userGrade === grade) { closeGradeSwitcher(); return; }
  userGrade = grade;
  initAllGoals();
  document.getElementById('gradeSwitcherLabel').textContent = gradeInfo[grade].icon + ' ' + gradeInfo[grade].name;
  closeGradeSwitcher();
  renderDaily();
  initChat();
  renderRoadmap();
  renderKnowledge();
  renderGoals();
  switchTab('chat');
  showToast('🔄 已切换到 ' + gradeInfo[grade].name, 'success');
  launchMiniConfetti();
}

function openGradeSwitcher() { document.getElementById('gradeModal').classList.add('show'); }
function closeGradeSwitcher() { document.getElementById('gradeModal').classList.remove('show'); }

// ==================== CHAT (enhanced) ====================
function initChat() {
  const msgs = document.getElementById('chatMessages');
  const quick = document.getElementById('chatQuick');
  const info = gradeInfo[userGrade];
  const knowledge = aiKnowledge[userGrade];
  const topics = Object.keys(knowledge.topics);

  msgs.innerHTML = `
    <div class="chat-msg ai">
      👋 嗨！我是未来鹅，你的专属职业成长伙伴～<br>
      看到你是 <strong>${info.icon} ${info.name}</strong>，我会给你最贴心的陪伴和建议！<br>
      你可以直接问我任何问题，或者点击下方的快捷按钮快速提问 ✨
      <div class="msg-time">刚刚</div>
    </div>
  `;

  quick.innerHTML = topics.map(t => `
    <button class="chat-quick-btn" onclick="quickAsk('${t}')">${t}</button>
  `).join('');

  document.getElementById('chatInput').placeholder = `问我任何问题，比如"${topics[0]}"…`;
  msgs.scrollTop = msgs.scrollHeight;
}

function quickAsk(q) {
  document.getElementById('chatInput').value = q;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML += `<div class="chat-msg user">${msg}<div class="msg-time">刚刚</div></div>`;

  // Show typing indicator
  const typingId = 'typing_' + Date.now();
  msgs.innerHTML += `<div class="typing" id="${typingId}"><span></span><span></span><span></span></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  input.value = '';

  // Simulate AI thinking with variable delay
  const delay = 600 + Math.random() * 1200;
  setTimeout(() => {
    // Remove typing indicator
    const typing = document.getElementById(typingId);
    if (typing) typing.remove();

    const reply = getAIResponse(msg);
    msgs.innerHTML += `<div class="chat-msg ai">${reply}<div class="msg-time">刚刚</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }, delay);
}

function getAIResponse(msg) {
  const knowledge = aiKnowledge[userGrade];
  const m = msg.toLowerCase();

  // Try to match against all topics
  for (const [topic, response] of Object.entries(knowledge.topics)) {
    // Check if the message contains keywords from the topic or vice versa
    const topicKeywords = topic.split('').filter(c => c.charCodeAt(0) > 127).join('');
    if (topicKeywords.length > 2 && m.includes(topicKeywords.substring(0, 3))) {
      return response;
    }
    // Also check for direct substring match
    if (topic.length > 3 && m.includes(topic.substring(0, 4))) {
      return response;
    }
  }

  // Fallback: return the intro + suggest topics
  const topics = Object.keys(knowledge.topics);
  const suggestions = topics.slice(0, 4).map(t => `「${t}」`).join('、');
  return knowledge.default + '\n\n💡 你可以试试问我：' + suggestions;
}

// ==================== ROADMAP ====================
function renderRoadmap() {
  const items = roadmaps[userGrade] || roadmaps.freshman;
  document.getElementById('timeline').innerHTML = items.map((item, i) => `
    <div class="timeline-item" style="animation: fadeInUp ${0.3 + i * 0.15}s ease both;">
      <div class="timeline-dot ${i === 0 ? 'current' : 'upcoming'}"></div>
      <div class="timeline-content">
        <h4>${i+1}. ${item.title} <span class="tl-tag ${item.tag === 'must' ? 'must' : 'recommend'}">${item.tagLabel}</span></h4>
        <p>${item.desc}</p>
        <div class="tl-resources">
          📎 ${item.resources.map(r => `<span>${r}</span>`).join(' ')}
        </div>
      </div>
    </div>
  `).join('');
}

// ==================== KNOWLEDGE ====================
function renderKnowledge() {
  document.getElementById('knowledgeGrid').innerHTML = knowledgeBase.map((k, i) => `
    <div class="knowledge-card" onclick="showKnowledgeDetail('${k.id}')" style="animation: fadeInUp ${0.3 + i * 0.1}s ease both;">
      <div class="kc-icon">${k.icon}</div>
      <div class="kc-title">${k.title}</div>
      <div class="kc-desc">${k.desc}</div>
    </div>
  `).join('');
  document.getElementById('knowledgeDetail').classList.remove('show');
}

function showKnowledgeDetail(id) {
  const k = knowledgeBase.find(kb => kb.id === id);
  if (!k) return;
  const detail = document.getElementById('knowledgeDetail');
  detail.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h3>${k.icon} ${k.title}</h3>
      <button class="btn btn-sm" style="background:#e2e8f0;" onclick="document.getElementById('knowledgeDetail').classList.remove('show')">✕ 收起</button>
    </div>
    ${k.content}
  `;
  detail.classList.add('show');
  detail.scrollIntoView({ behavior:'smooth' });
}

// ==================== GOALS ====================
function renderGoals() {
  const dailyG = getDailyGoals(userGrade);
  const weeklyG = getWeeklyGoals(userGrade);
  const stageG = getStageGoals(userGrade);
  const all = [...dailyG, ...weeklyG, ...stageG];
  // Merge with saved state
  all.forEach(g => { if (!(g.id in allGoals)) allGoals[g.id] = false; goalSetCache[g.id] = g; });

  const doneCount = all.filter(g => allGoals[g.id]).length;
  const pct = Math.round(doneCount / all.length * 100);

  const todayLabel = todayStr;

  document.getElementById('goalContainer').innerHTML = `
    <div class="goal-section">
      <h4>📅 今日任务 <span style="font-size:11px;color:var(--text-light);font-weight:400;">${todayLabel} · 每日0点刷新</span></h4>
      ${dailyG.map(g => renderGoalItem(g)).join('')}
    </div>
    <div class="goal-section">
      <h4>📆 本周挑战</h4>
      ${weeklyG.map(g => renderGoalItem(g)).join('')}
    </div>
    <div class="goal-section">
      <h4>🏆 ${gradeInfo[userGrade].name} 阶段目标</h4>
      ${stageG.map(g => renderGoalItem(g)).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:12px;">
      <span>总进度</span><span><strong>${doneCount}/${all.length}</strong> (${pct}%)</span>
    </div>
  `;

  document.getElementById('goalProgress').textContent = pct + '%';
  document.getElementById('goalProgressBar').style.width = pct + '%';

  if (pct === 100 && doneCount > 0) {
    setTimeout(() => { launchConfetti(); showToast('🎉 恭喜完成所有目标！你太棒了！', 'success'); }, 300);
  }
}

function renderGoalItem(g) {
  const done = allGoals[g.id] || false;
  return `
    <div class="goal-item">
      <div class="goal-check ${done ? 'done' : ''}" onclick="toggleGoal('${g.id}')">${done ? '✓' : ''}</div>
      <div class="goal-info">
        <div class="goal-title">${done ? '<s>' + g.title + '</s>' : g.title}</div>
        <div class="goal-detail">${g.detail}</div>
      </div>
      <span class="goal-badge ${done ? 'done' : ''}">${done ? '✅ 完成' : '⏳ 进行中'}</span>
    </div>
  `;
}

function toggleGoal(id) {
  allGoals[id] = !allGoals[id];
  renderGoals();
  if (allGoals[id]) {
    // Small confetti on individual completion
    const container = document.getElementById('confetti');
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.cssText = `left:${30+Math.random()*40}%;top:-10px;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;background:#10b981;animation-duration:${1+Math.random()*2}s;`;
        container.appendChild(piece);
        setTimeout(() => piece.remove(), 3000);
      }, i * 20);
    }
  }
}

// ==================== TABS ====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.hidden-section').forEach(s => s.classList.remove('show'));
  const idx = ['chat','roadmap','knowledge','goals'].indexOf(tab);
  if (idx >= 0) {
    document.querySelectorAll('.tab')[idx].classList.add('active');
    document.getElementById('tab-' + tab).classList.add('show');
  }
  if (tab === 'chat') {
    setTimeout(() => {
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    }, 100);
  }
  if (tab === 'goals') renderGoals();
}

// ==================== TOAST ====================
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'success');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.animation = 'slideIn 0.3s ease reverse'; setTimeout(() => t.remove(), 300); }, 2500);
}
</script>
